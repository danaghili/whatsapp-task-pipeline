# Home Assistant automation: routes the Accept / Skip buttons on medium-confidence
# task notifications fired by task_extract.py (_send_actionable).
#
#   Accept -> add the staged task to its to-do list
#   Skip   -> log the dismissal, no further action
#
# The whole decision state travels in the notification payload (trigger.event.data.task),
# so nothing server-side needs to remember a pending question. Import via the HA UI
# (Settings -> Automations -> ⋮ -> Edit in YAML) or drop into your automations store.

alias: Task Notification Response
description: >-
  Handles Accept/Skip actions on medium-confidence task actionable
  notifications. On Accept: adds the staged task text to the to-do list carried
  in the notification payload. On Skip: logs the dismissal only.
mode: parallel
max: 10

triggers:
  - trigger: event
    event_type: mobile_app_notification_action

conditions:
  - alias: Only ACCEPT_TASK_* or SKIP_TASK_* actions
    condition: template
    value_template: >-
      {{ trigger.event.data.action is defined
         and (trigger.event.data.action.startswith('ACCEPT_TASK_')
              or trigger.event.data.action.startswith('SKIP_TASK_')) }}

actions:
  - variables:
      action_name: "{{ trigger.event.data.action }}"
      task: "{{ trigger.event.data.task | default({}) }}"
      task_text: "{{ trigger.event.data.task.text if trigger.event.data.task is defined else '' }}"
      due_hint: "{{ trigger.event.data.task.due_hint if trigger.event.data.task is defined else '' }}"
      sender_name: "{{ trigger.event.data.task.sender if trigger.event.data.task is defined else 'Unknown' }}"
      entity_id: "{{ trigger.event.data.task.entity_id if trigger.event.data.task is defined else 'todo.tasks_inbox' }}"

  - choose:
      - alias: ACCEPT — add to the to-do list
        conditions:
          - condition: template
            value_template: "{{ action_name.startswith('ACCEPT_TASK_') and task_text|length > 0 }}"
        sequence:
          - action: todo.add_item
            data:
              entity_id: "{{ entity_id }}"
              item: "{{ task_text }}"
              description: "{{ 'From ' + sender_name + (' · Hint: ' + due_hint if due_hint else '') }}"
          - action: logbook.log
            data:
              name: Task
              message: "Accepted via notification: {{ task_text }}"

      - alias: SKIP — log only
        conditions:
          - condition: template
            value_template: "{{ action_name.startswith('SKIP_TASK_') }}"
        sequence:
          - action: logbook.log
            data:
              name: Task
              message: "Dismissed via notification: {{ task_text }}"
